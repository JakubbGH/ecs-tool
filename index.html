<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECS Validation Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f4f4; margin: 0; }
        h2 { margin-top: 0; color: #333; }

        /* Compact Grid Controls */
        .controls { 
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 12px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .full-width { grid-column: span 2; }

        label { font-weight: bold; font-size: 14px; color: #555; display: block; margin-bottom: 5px; }

        select { 
            width: 100%; 
            padding: 12px; 
            font-size: 16px; 
            border-radius: 6px; 
            border: 1px solid #ccc;
            background: #fff;
        }

        /* Buttons */
        .sync-btn { background: #6c757d; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .add-btn { 
            background: #28a745; color: white; border: none; padding: 15px; 
            font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer;
        }
        .add-btn:active { background: #218838; }

        /* Table */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #333; color: white; font-size: 14px; }

        .del-btn { 
            background: #dc3545; color: white; border: none; padding: 10px; 
            font-weight: bold; border-radius: 6px; width: 100%; cursor: pointer;
        }

        .export-btn {
            position: fixed;
            bottom: 20px;
            left: 5%;
            width: 90%;
            padding: 18px;
            background: #007bff;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,123,255,0.4);
            cursor: pointer;
        }

        #syncStatus { font-size: 12px; font-style: italic; }
        .container { margin-bottom: 100px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ECS Field Tool</h2>

    <div class="controls">
        <div class="full-width" style="display: flex; justify-content: space-between; align-items: center;">
            <button class="sync-btn" onclick="loadData()">🔄 Sync Database</button>
            <span id="syncStatus">Not synced</span>
        </div>

        <div>
            <label>Building</label>
            <select id="buildingSelect" onchange="updateEcsDropdown()"></select>
        </div>
        <div>
            <label>ECS Code</label>
            <select id="ecsSelect"></select>
        </div>

        <button class="add-btn full-width" onclick="addRow()">+ ADD TO LIST</button>
    </div>

    <table id="ecsTable">
        <thead>
            <tr>
                <th>Bldg</th>
                <th>ECS</th>
                <th>Validation</th>
                <th></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<button class="export-btn" onclick="exportExcel()">GENERATE EXCEL FILE</button>

<script src="app.js"></script>
</body>
</html>
