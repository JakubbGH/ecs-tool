<body>

    <h2>Field Data Collection</h2>

    <div style="background: #f0f0f0; padding: 15px; border: 1px solid #ccc;">
        <label>Building:</label>
        <select id="buildingSelect" onchange="updateEcsDropdown()"></select>

        <label style="margin-left:15px;">ECS Code:</label>
        <select id="ecsSelect"></select>

        <button onclick="addRow()" style="margin-left:15px;">+ Add to List</button>
    </div>

    <br>

    <table id="ecsTable" border="1" style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead>
            <tr style="background: #444; color: white;">
                <th>Building</th>
                <th>ECS Code</th>
                <th>Validation Status</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <br>
    <button onclick="exportExcel()" style="padding: 10px 20px; cursor: pointer;">
        Save & Export to Excel
    </button>

</body>
