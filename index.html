<body>

    <h2>ECS Validation Tool</h2>

    <div style="background: #f4f4f4; padding: 15px; border-radius: 8px;">
        <label>Select Building:</label>
        <select id="buildingSelect"></select>
        <button onclick="addRow()" style="background: #28a745; color: white;">Add to List</button>
    </div>

    <br>

    <table id="ecsTable" border="1" style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="background: #eee;">
                <th>Building (ECS Code)</th>
                <th>Validation Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <br>

    <button onclick="exportExcel()" style="width: 100%; font-weight: bold; background: #007bff; color: white;">
        Export Final Excel
    </button>

</body>
