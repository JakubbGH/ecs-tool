<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECS Validation Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f4f4; }
        .controls { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            background: white; padding: 20px; border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px;
        }
        .full-width { grid-column: span 2; }
        select, button { padding: 12px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; }
        .sync-btn { background: #6c757d; color: white; cursor: pointer; }
        .add-btn { background: #28a745; color: white; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #333; color: white; }
        .export-btn {
            position: fixed; bottom: 20px; left: 5%; width: 90%;
            padding: 20px; background: #007bff; color: white;
            font-size: 18px; font-weight: bold; border: none; border-radius: 10px;
        }
    </style>
</head>
<body>

    <h2>Field Data Collection</h2>

    <div class="controls">
        <div class="full-width" style="display:flex; justify-content: space-between;">
            <button class="sync-btn" onclick="loadData()">🔄 Load/Sync Data</button>
            <span id="syncStatus" style="font-size:12px; color:gray;">Not Synced</span>
        </div>

        <div>
            <label>Building</label><br>
            <select id="buildingSelect" style="width:100%" onchange="updateEcsDropdown()"></select>
        </div>
        <div>
            <label>ECS Code</label><br>
            <select id="ecsSelect" style="width:100%"></select>
        </div>

        <button class="add-btn full-width" onclick="addRow()">+ ADD ROW</button>
    </div>

    <table id="ecsTable">
        <thead>
            <tr>
                <th>Building</th>
                <th>ECS</th>
                <th>Validation</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button class="export-btn" onclick="exportExcel()">GENERATE EXCEL</button>

    <script src="app.js"></script>
</body>
</html>
